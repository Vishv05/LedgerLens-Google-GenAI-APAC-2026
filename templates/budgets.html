{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Manage Budgets</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <main class="main-content" style="max-width: 860px;">
        <section class="query-card">
            <h2 class="section-title">Monthly Budgets</h2>
            <form method="post" class="query-form">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary">Save Budget</button>
            </form>
            <div class="result-card" style="margin-top:1rem;">
                <h3 class="result-title">Your Budget Rules</h3>
                <div class="table-responsive">
                    <table class="data-table">
                        <thead><tr><th>Category</th><th>Monthly Limit</th></tr></thead>
                        <tbody>
                            {% for budget in budgets %}
                                <tr><td>{{ budget.category }}</td><td>₹{{ budget.monthly_limit }}</td></tr>
                            {% empty %}
                                <tr><td colspan="2">No budgets set yet.</td></tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
            <p class="hint"><a href="{% url 'index' %}">Back to Dashboard</a></p>
        </section>
    </main>
</body>
</html>
